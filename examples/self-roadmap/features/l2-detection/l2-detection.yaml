    coverage: { proofLevel: none, passing: false }
  - id: attribute-and-flip-red
    label: Attribute a signal to the owning node and flip it red, cited (CP-A Judge)
    lifecycle: planned
    note: 'AI attribution over the typed map — never regex. G2: every red is attributable + cited.'
    coverage: { proofLevel: none, passing: false }
  - id: generalize-feature-health
    label: Generalize the Feature Health flip to intent/workflow level, portable
    lifecycle: planned
    coverage: { proofLevel: none, passing: false }
gaps:
  - 'Adapter order CI -> reports -> runtime; shadow -> autonomous on a measured false-attribution rate.'
