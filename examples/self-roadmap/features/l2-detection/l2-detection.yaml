id: l2-detection
label: Signal-driven detection
areaId: l2-detection
lifecycle: planned
summary: 'A Watcher tails CI/error-logs/reports; a cheap Judge attributes each signal to the owning node and flips it red with provenance. Spec drafted; implementation planned.'
prd:
  - CODE_MAINTENANCE_L2_DETECTION_SPEC
intents:
